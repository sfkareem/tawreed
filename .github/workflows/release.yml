name: Release
# Builds Tawreed on push of a `v*` tag, or via manual trigger, and
# attaches the platform-specific onedir build as a workflow artifact.
# PyInstaller produces an "onedir" bundle: a folder containing
# Tawreed.exe + _internal/ with all dependencies.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Same PySide6 system deps as ci.yml — the test step below
      # needs libEGL/libGL even on the offscreen QPA platform.
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libdbus-1-3

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Build
        run: pyinstaller tawreed.spec
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawreed-${{ matrix.os }}
          path: dist/Tawreed/
          if-no-files-found: error
