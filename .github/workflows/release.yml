name: Release
# Builds Tawreed on push of a `v*` tag, or via manual trigger, and
# attaches the platform-specific onedir build as a workflow artifact.
# PyInstaller produces an "onedir" bundle: a folder containing
# Tawreed.exe + _internal/ with all dependencies.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Build
        run: pyinstaller tawreed.spec
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tawreed-${{ matrix.os }}
          path: dist/Tawreed/
          if-no-files-found: error
